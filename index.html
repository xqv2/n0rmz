    <script>
      // Restore deep path after the GitHub Pages 404 fallback re-routes us.
      (function () {
        var r = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (r && r !== location.href) history.replaceState(null, null, r);
      })();
    </script>
    <script>
      // ─── tink-debug ────────────────────────────────────────────────
      // Capture last ~80 events into localStorage so we can see what happened
      // before an iOS tab-kill / mid-modal crash. Renders a floating HUD on
      // touch devices showing live heap + a "Copy logs" button.
      (function () {
        if (window.__tinkDebug) return;
        var KEY = 'tinkdebug:v1';
        var MAX = 80;
        var t0 = Date.now();
        var hud, body, btn, hideBtn;
        var updateHud = function () {
          if (!body) return;
          var arr = read();
          var tail = arr.slice(-12);
          var line = tail.map(function (e) {
            var p = e.payload && Object.keys(e.payload).length ? ' ' + JSON.stringify(e.payload) : '';
            return (e.t / 1000).toFixed(1) + 's [' + (e.heap || '?') + '] ' + e.kind + p;
          }).join('\n');
          body.textContent = line;
        };
        var read = function () {
          try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { return []; }
        };
        var write = function (arr) {
          try { localStorage.setItem(KEY, JSON.stringify(arr.slice(-MAX))); } catch (e) {}
        };
        var log = function (kind, payload) {
          try {
            var arr = read();
            var heap = null;
            if (performance && performance.memory) {
              heap = Math.round(performance.memory.usedJSHeapSize / 1048576) + 'MB';
            }
            arr.push({ t: Date.now() - t0, kind: kind, heap: heap, payload: payload || {} });
            write(arr);
            updateHud();
          } catch (e) {
            // never let logging break the page
          }
        };
        window.__log = log;
        window.__tinkDebug = { read: read, clear: function () { localStorage.removeItem(KEY); updateHud(); } };

        // Was the previous session interrupted? If we see logs older than this
        // session's start, and the last log was NOT a clean "pageHide", the
        // page got killed by Safari (or crashed) and reloaded.
        var prior = read();
        var hadPrior = prior.length > 0;
        var navType = null;
        try {
          var navEntry = performance.getEntriesByType && performance.getEntriesByType('navigation')[0];
          navType = navEntry && navEntry.type;
        } catch (e) {}
        var bootInfo = {
          navType: navType,
          ua: (navigator.userAgent || '').slice(0, 60),
          href: location.href.slice(-40),
          ref: (document.referrer || '').slice(-40),
        };
        if (hadPrior) {
          bootInfo.priorLast = prior[prior.length - 1];
          bootInfo.priorTail = prior.slice(-3).map(function (e) { return e.kind; });
        }
        log('boot', bootInfo);

        // ─ event hooks ─
        window.addEventListener('error', function (e) {
          log('error', { msg: String(e.message || ''), src: String(e.filename || ''), line: e.lineno });
        });
        window.addEventListener('unhandledrejection', function (e) {
          log('promiseError', { reason: String(e.reason && (e.reason.message || e.reason)) });
        });
        window.addEventListener('pagehide', function (e) {
          log('pageHide', { persisted: !!e.persisted });
        });
        window.addEventListener('beforeunload', function () { log('beforeUnload', {}); });
        document.addEventListener('visibilitychange', function () {
          log('visibility', { state: document.visibilityState });
        });
        window.addEventListener('popstate', function () { log('popstate', { href: location.href }); });
        document.addEventListener('click', function (e) {
          var el = e.target;
          var tag = el && el.tagName;
          var cls = (el && el.className && el.className.toString && el.className.toString()) || '';
          var id = (el && el.closest && el.closest('[data-id]') && el.closest('[data-id]').getAttribute('data-id')) || null;
          log('click', { tag: tag, cls: cls.slice(0, 60), id: id });
        }, true);

        // Watch for the DetailModal mount/unmount.
        var modalUp = false;
        var checkModal = function () {
          var present = !!document.querySelector('.detail-modal');
          if (present !== modalUp) {
            modalUp = present;
            log(present ? 'modalOpen' : 'modalClose', {});
          }
        };
        var mo = new MutationObserver(checkModal);
        mo.observe(document.documentElement, { childList: true, subtree: true });

        // Periodic heap sample.
        if (performance && performance.memory) {
          setInterval(function () { log('heap', {}); }, 2000);
        }

        // Intercept any explicit navigation: location.assign/replace/href,
        // history.back/forward, history.pushState/replaceState, location.reload.
        try {
          var origReload = location.reload && location.reload.bind(location);
          if (origReload) {
            location.reload = function () {
              log('locationReload', { stack: (new Error()).stack ? (new Error()).stack.slice(0, 200) : '' });
              return origReload.apply(location, arguments);
            };
          }
        } catch (e) {}
        try {
          var origAssign = location.assign && location.assign.bind(location);
          if (origAssign) {
            location.assign = function (url) { log('locationAssign', { url: String(url) }); return origAssign.apply(location, arguments); };
          }
          var origReplace = location.replace && location.replace.bind(location);
          if (origReplace) {
            location.replace = function (url) { log('locationReplace', { url: String(url) }); return origReplace.apply(location, arguments); };
          }
        } catch (e) {}
        try {
          var origPush = history.pushState.bind(history);
          history.pushState = function () { log('pushState', { args: [].slice.call(arguments).slice(0, 3) }); return origPush.apply(history, arguments); };
          var origReplaceState = history.replaceState.bind(history);
          history.replaceState = function () { log('replaceState', { args: [].slice.call(arguments).slice(0, 3) }); return origReplaceState.apply(history, arguments); };
          var origBack = history.back.bind(history);
          history.back = function () { log('historyBack', {}); return origBack.apply(history, arguments); };
          var origForward = history.forward.bind(history);
          history.forward = function () { log('historyForward', {}); return origForward.apply(history, arguments); };
          var origGo = history.go.bind(history);
          history.go = function (n) { log('historyGo', { n: n }); return origGo.apply(history, arguments); };
        } catch (e) {}

        window.addEventListener('hashchange', function () { log('hashchange', { hash: location.hash }); });

        // ─ HUD overlay ─
        var ensureHud = function () {
          if (hud || !document.body) return;
          hud = document.createElement('div');
          hud.style.cssText = [
            'position:fixed','top:0','left:0','right:0','z-index:99999',
            'font:11px/1.35 ui-monospace,Menlo,monospace','color:#fff',
            'background:#b00020','padding:8px 10px','max-height:55vh','overflow:auto',
            'border-bottom:3px solid #fff','pointer-events:auto','box-shadow:0 4px 16px rgba(0,0,0,0.6)'
          ].join(';');
          var bar = document.createElement('div');
          bar.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap';
          var label = document.createElement('span');
          label.textContent = 'tink-debug';
          label.style.cssText = 'font-weight:700;color:#fff;background:#000;padding:2px 6px;border-radius:3px';
          btn = document.createElement('button');
          btn.textContent = 'Copy';
          btn.style.cssText = 'font:11px ui-monospace;padding:4px 10px;background:#fff;color:#000;border:0;border-radius:4px;font-weight:700';
          btn.onclick = function (e) {
            e.stopPropagation();
            var txt = JSON.stringify(read(), null, 2);
            if (navigator.clipboard) navigator.clipboard.writeText(txt).then(function () { btn.textContent = 'Copied'; });
            else { var ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); btn.textContent = 'Copied'; }
            setTimeout(function () { btn.textContent = 'Copy'; }, 1200);
          };
          var clrBtn = document.createElement('button');
          clrBtn.textContent = 'Clear';
          clrBtn.style.cssText = btn.style.cssText;
          clrBtn.onclick = function (e) { e.stopPropagation(); window.__tinkDebug.clear(); };
          hideBtn = document.createElement('button');
          hideBtn.textContent = 'Hide';
          hideBtn.style.cssText = btn.style.cssText;
          hideBtn.onclick = function (e) { e.stopPropagation(); hud.style.display = 'none'; };
          bar.appendChild(label); bar.appendChild(btn); bar.appendChild(clrBtn); bar.appendChild(hideBtn);
          body = document.createElement('pre');
          body.style.cssText = 'margin:0;white-space:pre-wrap;word-break:break-word;color:#fff';
          hud.appendChild(bar); hud.appendChild(body);
          document.body.appendChild(hud);
          updateHud();
        };
        if (document.body) ensureHud();
        else document.addEventListener('DOMContentLoaded', ensureHud);
        setInterval(function () { ensureHud(); updateHud(); }, 500);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
